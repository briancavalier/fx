<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmarks</title>
    <link rel="stylesheet" href="/bookmarks/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Bookmarks</h1>
          <p>Reading queue</p>
        </div>
        <output id="status" class="status" aria-live="polite"></output>
      </header>

      <section class="panel" aria-labelledby="add-title">
        <h2 id="add-title">Add bookmark</h2>
        <form id="add-form" class="form-row">
          <label>
            <span>URL</span>
            <input id="url-input" name="url" type="url" autocomplete="url" required>
          </label>
          <label>
            <span>Tags</span>
            <input id="tags-input" name="tags" type="text" autocomplete="off" placeholder="typescript, effects">
          </label>
          <button id="add-button" type="submit">Add</button>
        </form>
      </section>

      <section class="panel" aria-labelledby="filter-title">
        <h2 id="filter-title">Queue</h2>
        <form id="filter-form" class="filters">
          <label>
            <span>Status</span>
            <select id="status-filter" name="status">
              <option value="unread" selected>Unread</option>
              <option value="read">Read</option>
              <option value="archived">Archived</option>
              <option value="all">All</option>
            </select>
          </label>
          <label>
            <span>Tag</span>
            <input id="tag-filter" name="tag" type="text" autocomplete="off">
          </label>
          <label>
            <span>Search</span>
            <input id="text-filter" name="text" type="search" autocomplete="off">
          </label>
          <button id="filter-button" type="submit">Apply</button>
        </form>
        <div id="bookmarks" class="bookmarks" aria-live="polite"></div>
      </section>
    </main>
    <script type="importmap">
      {
        "imports": {
          "@briancavalier/fx": "/bookmarks/assets/src/index.js",
          "@briancavalier/fx/codec": "/bookmarks/assets/src/Codec.js",
          "@briancavalier/fx/http-client": "/bookmarks/assets/src/HttpClient.js",
          "@briancavalier/fx/log": "/bookmarks/assets/src/Log.js",
          "@briancavalier/fx/random": "/bookmarks/assets/src/Random.js",
          "@briancavalier/fx/time": "/bookmarks/assets/src/Time.js"
        }
      }
    </script>
    <script type="module" src="/bookmarks/assets/examples/advanced/bookmarks/browser/app.js"></script>
  </body>
</html>
